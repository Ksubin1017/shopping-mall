services:
  app1:
    build: .
    platform: linux/amd64
    ports:
      - 8060:8090
    networks:
      - app-net

  app2:
    build: .
    platform: linux/amd64
    ports:
      - 8070:8090
    networks:
      - app-net

  nginx:
    image: nginx:latest
    platform: linux/amd64
    container_name: nginx-proxy
    ports:
      - "8050:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
